# Public demo of Alutic: showcase dashboard with fake balances, real market data elsewhere.
services:
  - type: web
    name: alutic-demo
    runtime: node
    plan: free
    buildCommand: npm ci && npm run gen && npm run build
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: SOLANA_RPC
        value: https://api.devnet.solana.com
      - key: NODE_VERSION
        value: '22'
