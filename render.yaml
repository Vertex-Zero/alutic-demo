# Public demo of Alutic: simulated balances, real market data, clearly labeled.
services:
  - type: web
    name: alutic-demo
    runtime: node
    plan: free
    buildCommand: npm ci && npm run gen && npm run build
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: ALUTIC_DEMO
        value: '1'
      - key: VITE_DEMO
        value: '1'
      - key: SOLANA_RPC
        value: https://api.devnet.solana.com
      - key: NODE_VERSION
        value: '22'
